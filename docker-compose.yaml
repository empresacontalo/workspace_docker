version: '3.8'

services:
  workspace:
    image: workspace_docker:latest # No Swarm, o build local é ignorado. É necessário criar a imagem antes ou usar um registry.
    networks:
      - npm_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      # RDP Credentials
      - RDP_USER=aiuser
      - RDP_PASSWORD=aipassword
      # Omniroute Configuration
      - OMNIROUTE_ALLOW_IMAGES=true
      - OMNIROUTE_LOG_LEVEL=info
      # Hermes Configuration
      - HERMES_AGENT_AUTO_UPDATE=true
      - HERMES_AGENT_INSTALL_DIR=/usr/local/lib/node_modules
      # API Keys (to be filled by the user)
      - ANTHROPIC_API_KEY=
      - OPENAI_API_KEY=
      - GEMINI_API_KEY=
      - GITHUB_TOKEN=
    volumes:
      - workspace_data:/home/aiuser/workspace

  guacd:
    image: guacamole/guacd:latest
    networks:
      - npm_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  guacamole:
    image: guacamole/guacamole:latest
    ports:
      - "8080:8080" # Porta para acesso web do Guacamole
    environment:
      - GUACD_HOSTNAME=guacd
      - GUACD_PORT=4822
    volumes:
      - ./user-mapping.xml:/etc/guacamole/user-mapping.xml:ro
    networks:
      - npm_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  npm_public:
    external: true

volumes:
  workspace_data:
